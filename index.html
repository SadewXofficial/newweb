<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Space</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="container">
        <header>
            <div class="profile-img"></div>
            <h1 class="rgb-text">මම [ඔයාගේ නම]</h1>
            <p>Digital Creator | Tech Enthusiast</p>
        </header>

        <section class="about">
            <h3>මම ගැන</h3>
            <p>මම අලුත් දේවල් ඉගෙන ගන්න ආස, නිර්මාණශීලී කෙනෙක්.</p>
        </section>

        <div class="stats-container">
            <div class="stat-card">
                <h2 class="counter" data-target="5000">0</h2>
                <p>Facebook</p>
            </div>
            <div class="stat-card">
                <h2 class="counter" data-target="1200">0</h2>
                <p>Instagram</p>
            </div>
            <div class="stat-card">
                <h2 class="counter" data-target="850">0</h2>
                <p>YouTube</p>
            </div>
        </div>

        <div class="social-links">
            <a href="#" class="btn fb">Facebook</a>
            <a href="#" class="btn ig">Instagram</a>
            <a href="#" class="btn yt">YouTube</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
