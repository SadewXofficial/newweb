<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thorgal Official Site</title>
    <style>
        /* මූලික සැකසුම් */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Arial', sans-serif;
            overflow: hidden; /* Preloader එක යනකම් scroll කිරීම වැළැක්වීමට */
        }

        /* 1. ප්‍රධාන PRELOADER කොටස */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: clip-path 1.2s cubic-bezier(0.77, 0, 0.175, 1); 
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        }

        .preloader-content {
            text-align: center;
        }

        .brand-name {
            color: #ffffff;
            font-family: 'Arial Black', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 8px;
            margin: 25px 0;
        }

        .line {
            height: 3px;
            background-color: #b59410;
            width: 0%;
            margin: 0 auto;
            transition: width 0.1s linear;
        }

        .percentage {
            color: #b59410;
            font-size: 1.2rem;
            margin-top: 15px;
            letter-spacing: 2px;
        }

        /* කඩදාසිය ඉරෙනවා වගේ ඉවත් වන ක්‍රියාකාරීත්වය */
        #preloader.hide {
            clip-path: polygon(0 0, 0 0, 100% 100%, 0 100%); 
        }


        /* 2. ප්‍රධාන පිටුව (HERO SECTION) */
        .hero-section {
            height: 100vh;
            /* ඔයා එවපු රූපයේ නම මෙතනට දාන්න (උදා: image.png) */
            background-image: url('loder.avif'); 
            background-size: cover; /* අපි කතා කරපු ගුණාංගය */
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        /* රූපය උඩින් වැටෙන ලස්සන අඳුරු ගතියක් (Overlay) */
        .hero-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.1); 
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .subtitle {
            color: #555555;
            font-size: 1rem;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .main-title {
            color: #8c7662; /* Thorgal අකුරු වල පාට */
            font-family: 'Arial Black', sans-serif;
            font-size: 4rem;
            letter-spacing: 4px;
            margin: 15px 0;
        }

        /* DÉCOUVRIR බොත්තම */
        .discover-btn {
            background-color: #1a1a1a;
            color: #ffffff;
            border: none;
            padding: 15px 40px;
            font-size: 1rem;
            letter-spacing: 3px;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.3s ease;
        }

        .discover-btn:hover {
            background-color: #b59410; /* Mouse එක උඩට යද්දී පාට වෙනස් වීම */
        }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="preloader-content">
            <div class="line" id="topLine"></div>
            <h1 class="brand-name">THORGAL</h1>
            <div class="line" id="bottomLine"></div>
            <div class="percentage" id="percentText">0%</div>
        </div>
    </div>

    <div class="hero-section">
        <div class="hero-content">
            <p class="subtitle">ROSINSKI VAN HAMME</p>
            <h1 class="main-title">THORGAL</h1>
            <p class="subtitle">LE LOMBARD</p>
            <button class="discover-btn">DÉCOUVRIR</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            let percentage = 0;
            const percentText = document.getElementById("percentText");
            const topLine = document.getElementById("topLine");
            const bottomLine = document.getElementById("bottomLine");
            const preloader = document.getElementById("preloader");

            const loaderInterval = setInterval(() => {
                percentage++;
                percentText.innerText = percentage + "%";
                topLine.style.width = percentage + "%";
                bottomLine.style.width = percentage + "%";

                if (percentage >= 100) {
                    clearInterval(loaderInterval);
                    
                    // Paper tear effect එක සිද්ධ වේ
                    preloader.classList.add("hide"); 
                    
                    // මුළුමනින්ම ඉවත් කිරීම
                    setTimeout(() => {
                        preloader.style.display = "none";
                        document.body.style.overflow = "auto"; // පිටුව scroll කිරීමට ඉඩ දීම
                    }, 1200); 
                }
            }, 30); 
        });
    </script>
</body>
</html>
